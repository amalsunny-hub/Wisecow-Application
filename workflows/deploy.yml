name: Build Push Deploy
on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: wisecow-app
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Generate image tags
        id: vars
        run: echo "tags=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v2
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ steps.vars.outputs.tags }}
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ steps.vars.outputs.tags }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
      - name: Set up Kubecl
        uses: azure/setup-kubectl@v1
      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/deployment.yaml
          kuvectl apply -f k8s/service.yaml
      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/wisecow