name: Build Push Deploy
on:
  push:
    branches:
      - master
env:
  IMAGE_NAME: wisecow-app
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Generate image tags
        id: vars
        run: echo "tags=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ steps.vars.outputs.tags }} .
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ steps.vars.outputs.tags }}
